
services:

  backend:
    build: ./backend
    ports:
      - "8000:8000"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: knowledge

    ports:
      - "5432:5432"

  qdrant:
    image: qdrant/qdrant

    ports:
      - "6333:6333"

  frontend:
    build: ./frontend

    ports:
      - "3000:3000"